# HTTP → HTTPS redirect
server {
    listen 80;
    server_name map.mertpeker.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name map.mertpeker.com;

    ssl_certificate     /etc/letsencrypt/live/map.mertpeker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/map.mertpeker.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript;

    # Statik dosyalar — agressive cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # GeoJSON / JSON veri dosyaları — hafif cache
    location ~* \.(json|geojson)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # Valhalla proxy — /api/valhalla/* → valhalla:8002
    location /api/valhalla/ {
        proxy_pass http://valhalla:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # İSPARK API proxy (CORS bypass) — /api/ibb/* → api.ibb.gov.tr
    location /api/ibb/ {
        proxy_pass https://api.ibb.gov.tr/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.ibb.gov.tr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    # SPA fallback — tüm route'lar index.html'e
    location / {
        try_files $uri $uri/ /index.html;
    }
}
