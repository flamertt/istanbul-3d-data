services:
  # ── Valhalla routing engine ──────────────────────────────────────────────────
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: valhalla-turkey
    ports:
      - "8002:8002"
    volumes:
      - ./valhalla-data:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/turkey-latest.osm.pbf
      - serve_tiles=True
      - build_elevation=False
      - build_admins=True
      - build_time_zones=True
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: turkey-heatmap-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - valhalla
    restart: unless-stopped
